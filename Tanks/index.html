<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tank Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🔥 TANK BATTLE 🔥</h1>
        </div>

        <div class="hud">
            <div class="team-hud team-player">
                <h3>🟦 Your Team</h3>
                <div id="playerHpBars"></div>
            </div>
            <div class="round-info">
                <div class="level-label">Level <span id="levelNum">1</span>/5</div>
                <div class="round-number">Round <span id="roundNum">1</span></div>
                <div class="score">Score: <span id="score">0</span></div>
            </div>
            <div class="team-hud team-enemy">
                <h3>🟥 Enemy Team</h3>
                <div id="enemyHpBars"></div>
            </div>
        </div>

        <div id="combine-hint" class="combine-hint hidden">🔀 Your Sawblade + Cannon are close — tap COMBINE!</div>

        <canvas id="gameCanvas" width="1200" height="600"></canvas>

        <div class="controls-hint">
            <p>Move with joystick · Tanks auto-attack · Drive saw+cannon together to COMBINE!</p>
        </div>
    </div>

    <!-- Touch Controls -->
    <div class="touch-controls">
        <div class="touch-left">
            <div class="tank-select-btns" id="tankSelectBtns">
                <button class="tank-select-btn selected" id="selectSaw">🔧 Sawblade</button>
                <button class="tank-select-btn" id="selectCannon">💥 Cannon</button>
            </div>
            <div class="joystick-base" id="joystick-base">
                <div class="joystick-knob" id="joystick-knob"></div>
            </div>
            <div class="joystick-label">MOVE</div>
        </div>
        <div class="touch-right">
            <button class="combine-btn hidden" id="combine-btn">🔀</button>
            <div class="combine-label hidden" id="combine-label">COMBINE</div>
            <button class="attack-btn" id="attack-btn">⚔️</button>
            <div class="attack-label">ATTACK</div>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-content">
            <h2 id="gameOverTitle">🏆 VICTORY! 🏆</h2>
            <p id="gameOverMsg">You destroyed the enemy team!</p>
            <p class="final-score">Score: <span id="finalScore">0</span></p>
            <button id="nextRoundBtn" class="play-again-btn">▶️ Next Round</button>
            <button id="playAgainBtn" class="play-again-btn" style="display:none;">Restart</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
