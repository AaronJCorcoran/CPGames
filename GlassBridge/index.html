<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cedar's Glass Bridge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }

        .game-container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .info-panel {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bridge-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .main-content {
            width: 100%;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            font-size: 1.2em;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .lives {
            color: #ff6b6b;
        }

        .money {
            color: #51cf66;
        }

        .step-number {
            color: #ffd43b;
        }

        .bridge {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .step {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .step-label {
            font-size: 1.2em;
            font-weight: bold;
            width: 60px;
            text-align: center;
        }

        .tiles {
            display: flex;
            gap: 20px;
        }

        .tile {
            width: 120px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .tile:hover:not(.disabled):not(.correct):not(.wrong) {
            transform: scale(1.05);
            background: rgba(255,255,255,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .tile.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .tile.correct {
            background: #51cf66;
            border-color: #2f9e44;
            animation: pulse 0.5s;
        }

        .tile.wrong {
            background: #ff6b6b;
            border-color: #c92a2a;
            animation: shake 0.5s;
        }

        .tile.safe-path {
            background: rgba(81, 207, 102, 0.4);
            border-color: #51cf66;
        }

        .tile.memory-flash {
            background: #ffd43b;
            border-color: #fab005;
            opacity: 1 !important;
            cursor: default;
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message {
            text-align: center;
            font-size: 1.3em;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
        }

        .finish-line {
            text-align: center;
            font-size: 2em;
            padding: 20px;
            background: linear-gradient(45deg, #ffd43b, #fab005);
            color: #333;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            background: #fab005;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #333;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #ffd43b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .game-over {
            text-align: center;
            padding: 30px;
            background: rgba(255,107,107,0.2);
            border: 3px solid #ff6b6b;
            border-radius: 15px;
            margin: 20px 0;
        }

        .game-over h2 {
            font-size: 2em;
            margin-bottom: 15px;
        }

        .controls-hint {
            font-size: 0.9em;
            opacity: 0.8;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        .music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        .music-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        .wheel-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .wheel-modal.active {
            display: flex;
        }

        .wheel-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            position: relative;
        }

        .wheel-title {
            color: #333;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .wheel-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff6b6b;
            z-index: 10;
        }

        .wheel {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 8px solid #333;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            overflow: hidden;
        }

        .wheel.spinning {
            transition: transform 6s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .segment-content {
            transform: rotate(30deg) translateX(60px);
            text-align: center;
            width: 120px;
        }

        .wheel-result {
            margin-top: 30px;
            color: #333;
            font-size: 1.8em;
            font-weight: bold;
            min-height: 60px;
        }

        .power-up-indicator {
            display: inline-block;
            padding: 5px 10px;
            background: rgba(255, 215, 0, 0.3);
            border: 2px solid #ffd700;
            border-radius: 5px;
            margin-left: 10px;
            font-size: 0.8em;
        }

        .mode-selector {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mode-selector.hidden {
            display: none;
        }

        .mode-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
        }

        .mode-content h2 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 30px;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 20px 40px;
            font-size: 1.3em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            min-width: 200px;
        }

        .mode-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .mode-btn-hard {
            background: #e03131;
        }

        .mode-btn-hard:hover {
            background: #c92a2a;
        }

        .mode-btn-memory {
            background: #9b59b6;
        }

        .mode-btn-memory:hover {
            background: #7d3c98;
        }

        .grade-selector {
            margin-top: 20px;
        }

        .grade-selector.hidden {
            display: none;
        }

        .grade-selector h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .grade-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .grade-btn {
            padding: 15px;
            font-size: 1.1em;
            background: #51cf66;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .grade-btn:hover {
            background: #2f9e44;
            transform: scale(1.05);
        }

        .math-question {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 1.4em;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tile.math-tile {
            font-size: 1.2em;
            flex-direction: column;
            padding: 10px;
        }

        .game-mode-badge {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="mode-selector" id="mode-selector">
        <div class="mode-content">
            <h2>🎮 Choose Game Mode 🎮</h2>
            <div class="mode-buttons">
                <button class="mode-btn" onclick="selectMode('classic')">🌉 Classic Mode<br><small style="font-size: 0.7em;">Left or Right (5 Lives)</small></button>
                <button class="mode-btn mode-btn-hard" onclick="selectMode('hard')">💀 Hard Mode<br><small style="font-size: 0.7em;">No Hints (5 Lives)</small></button>
                <button class="mode-btn" onclick="selectMode('math')">🧮 Math Mode<br><small style="font-size: 0.7em;">Answer Questions (2 Lives)</small></button>
                <button class="mode-btn mode-btn-memory" onclick="selectMode('memory')">🧠 Memory Mode<br><small style="font-size: 0.7em;">Memorize Path (1 Life)</small></button>
            </div>
            <div class="grade-selector hidden" id="grade-selector">
                <h3>Select Grade Level:</h3>
                <div class="grade-buttons">
                    <button class="grade-btn" onclick="startMathMode(1)">Grade 1</button>
                    <button class="grade-btn" onclick="startMathMode(2)">Grade 2</button>
                    <button class="grade-btn" onclick="startMathMode(3)">Grade 3</button>
                    <button class="grade-btn" onclick="startMathMode(4)">Grade 4</button>
                    <button class="grade-btn" onclick="startMathMode(5)">Grade 5</button>
                    <button class="grade-btn" onclick="startMathMode(6)">Grade 6</button>
                    <button class="grade-btn" onclick="startMathMode(7)">Grade 7</button>
                    <button class="grade-btn" onclick="startMathMode(8)">Grade 8</button>
                </div>
            </div>
        </div>
    </div>

    <div class="header">
        <h1>🌉 Cedar's Glass Bridge 🌉</h1>
    </div>

    <div class="game-container">
        <div class="info-panel">
            <div class="game-mode-badge" id="mode-badge"></div>
            
            <div class="math-question hidden" id="math-question"></div>
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Lives</span>
                    <span class="stat-value lives" id="lives">5</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Money</span>
                    <span class="stat-value money" id="money">$0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Step</span>
                    <span class="stat-value step-number" id="current-step">1</span>
                </div>
            </div>

            <div id="power-ups" style="text-align: center; padding: 10px; font-size: 1.1em;"></div>

            <div class="message" id="message">Choose Left or Right to cross the bridge!</div>

            <div class="controls-hint" style="text-align: center;">💡 Tap a tile to choose, or use ⬅️ ➡️ arrow keys</div>
        </div>

        <div class="bridge-panel">
            <div class="bridge" id="bridge"></div>
            <div class="finish-line">🏆 FINISH LINE - SPIN THE WHEEL! 🎰</div>
        </div>
    </div>

    <div class="wheel-modal" id="wheel-modal">
        <div class="wheel-container">
            <div class="wheel-title">🎰 PRIZE WHEEL! 🎰</div>
            <div class="wheel-wrapper">
                <div class="wheel-pointer"></div>
                <div class="wheel" id="wheel"></div>
            </div>
            <div class="wheel-result" id="wheel-result"></div>
        </div>
    </div>

    <button class="music-toggle" id="music-toggle" onclick="toggleMusic()">🔊 Music ON</button>

    <script>
        const TOTAL_STEPS = 8;
        const MAX_LIVES = 5;
        const MATH_MODE_LIVES = 2;
        const HARD_MODE_LIVES = 5;
        const MEMORY_MODE_LIVES = 1;

        // Prize wheel configuration
        const PRIZES = [
            { name: '$8,000', value: 8000, probability: 0.50, color: '#51cf66', type: 'money' },
            { name: '$13,000', value: 13000, probability: 0.20, color: '#4dabf7', type: 'money' },
            { name: '$20,000', value: 20000, probability: 0.10, color: '#ff6b6b', type: 'money' },
            { name: 'Free Step', value: 1, probability: 0.10, color: '#ffd43b', type: 'freeStep' },
            { name: 'Bonus Life', value: 1, probability: 0.07, color: '#ff69b4', type: 'bonusLife' },
            { name: '$100,000', value: 100000, probability: 0.03, color: '#9b59b6', type: 'money' }
        ];

        let gameMode = 'classic'; // 'classic', 'hard', 'math', or 'memory'
        let gradeLevel = 1;
        let currentStep = 0;
        let lives = MAX_LIVES;
        let money = 0;
        let correctPath = [];
        let learnedPath = [];
        let gameActive = true;
        let isMemoryFlashing = false;
        let freeStepsAvailable = 0;
        let bonusLivesAvailable = 0;
        let currentQuestion = null;

        // Audio context for sounds
        let audioContext = null;
        let backgroundMusicNode = null;
        let musicEnabled = true;

        // Initialize audio context
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                startBackgroundMusic();
            }
        }

        // Play a tone
        function playTone(frequency, duration, type = 'sine') {
            if (!audioContext || !musicEnabled) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        // Play success sound
        function playSuccessSound() {
            if (!musicEnabled) return;
            playTone(523.25, 0.1); // C5
            setTimeout(() => playTone(659.25, 0.15), 100); // E5
        }

        // Play error sound
        function playErrorSound() {
            if (!musicEnabled) return;
            playTone(200, 0.15, 'sawtooth');
            setTimeout(() => playTone(150, 0.2, 'sawtooth'), 150);
        }

        // Play win sound
        function playWinSound() {
            if (!musicEnabled) return;
            const notes = [523.25, 587.33, 659.25, 783.99]; // C, D, E, G
            notes.forEach((note, i) => {
                setTimeout(() => playTone(note, 0.2), i * 100);
            });
        }

        // Background music
        function startBackgroundMusic() {
            if (!audioContext || !musicEnabled || backgroundMusicNode) return;
            
            const oscillator1 = audioContext.createOscillator();
            const oscillator2 = audioContext.createOscillator();
            const oscillator3 = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator1.connect(gainNode);
            oscillator2.connect(gainNode);
            oscillator3.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // Soothing ambient chord - A minor
            oscillator1.frequency.value = 220.00; // A3
            oscillator2.frequency.value = 261.63; // C4
            oscillator3.frequency.value = 329.63; // E4
            
            oscillator1.type = 'triangle';
            oscillator2.type = 'triangle';
            oscillator3.type = 'triangle';
            
            gainNode.gain.setValueAtTime(0.02, audioContext.currentTime);
            
            oscillator1.start();
            oscillator2.start();
            oscillator3.start();
            
            backgroundMusicNode = { oscillator1, oscillator2, oscillator3, gainNode };
        }

        // Stop background music
        function stopBackgroundMusic() {
            if (backgroundMusicNode) {
                backgroundMusicNode.oscillator1.stop();
                backgroundMusicNode.oscillator2.stop();
                backgroundMusicNode.oscillator3.stop();
                backgroundMusicNode = null;
            }
        }

        // Toggle music
        function toggleMusic() {
            musicEnabled = !musicEnabled;
            const button = document.getElementById('music-toggle');
            
            if (musicEnabled) {
                button.textContent = '🔊 Music ON';
                initAudio();
            } else {
                button.textContent = '🔇 Music OFF';
                stopBackgroundMusic();
            }
        }

        // Mode selection
        function selectMode(mode) {
            if (mode === 'classic') {
                gameMode = 'classic';
                lives = MAX_LIVES;
                document.getElementById('mode-selector').classList.add('hidden');
                initGame();
            } else if (mode === 'hard') {
                gameMode = 'hard';
                lives = HARD_MODE_LIVES;
                document.getElementById('mode-selector').classList.add('hidden');
                initGame();
            } else if (mode === 'memory') {
                gameMode = 'memory';
                lives = MEMORY_MODE_LIVES;
                document.getElementById('mode-selector').classList.add('hidden');
                initGame();
            } else if (mode === 'math') {
                document.getElementById('grade-selector').classList.remove('hidden');
            }
        }

        function startMathMode(grade) {
            gameMode = 'math';
            gradeLevel = grade;
            lives = MATH_MODE_LIVES;
            document.getElementById('mode-selector').classList.add('hidden');
            initGame();
        }

        // Generate math question based on grade level
        function generateMathQuestion() {
            let question, answer, wrongAnswer;
            
            switch(gradeLevel) {
                case 1: // Addition and subtraction 1-20
                    if (Math.random() > 0.5) {
                        const a = Math.floor(Math.random() * 10) + 1;
                        const b = Math.floor(Math.random() * 10) + 1;
                        answer = a + b;
                        question = `${a} + ${b} = ?`;
                    } else {
                        const a = Math.floor(Math.random() * 15) + 5;
                        const b = Math.floor(Math.random() * a) + 1;
                        answer = a - b;
                        question = `${a} - ${b} = ?`;
                    }
                    wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 5) + 1 : -(Math.floor(Math.random() * 5) + 1));
                    break;
                    
                case 2: // Addition and subtraction 1-100
                    if (Math.random() > 0.5) {
                        const a = Math.floor(Math.random() * 50) + 1;
                        const b = Math.floor(Math.random() * 50) + 1;
                        answer = a + b;
                        question = `${a} + ${b} = ?`;
                    } else {
                        const a = Math.floor(Math.random() * 80) + 20;
                        const b = Math.floor(Math.random() * a) + 1;
                        answer = a - b;
                        question = `${a} - ${b} = ?`;
                    }
                    wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 10) + 1 : -(Math.floor(Math.random() * 10) + 1));
                    break;
                    
                case 3: // Multiplication and division basics
                    if (Math.random() > 0.5) {
                        const a = Math.floor(Math.random() * 10) + 1;
                        const b = Math.floor(Math.random() * 10) + 1;
                        answer = a * b;
                        question = `${a} × ${b} = ?`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 10) + 1 : -(Math.floor(Math.random() * 10) + 1));
                    } else {
                        const b = Math.floor(Math.random() * 10) + 1;
                        const answer_temp = Math.floor(Math.random() * 10) + 1;
                        const a = b * answer_temp;
                        answer = answer_temp;
                        question = `${a} ÷ ${b} = ?`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 5) + 1 : -(Math.floor(Math.random() * 5) + 1));
                    }
                    break;
                    
                case 4: // Multi-digit multiplication, fractions
                    if (Math.random() > 0.6) {
                        const a = Math.floor(Math.random() * 20) + 10;
                        const b = Math.floor(Math.random() * 10) + 1;
                        answer = a * b;
                        question = `${a} × ${b} = ?`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 20) + 5 : -(Math.floor(Math.random() * 20) + 5));
                    } else {
                        const num1 = Math.floor(Math.random() * 5) + 1;
                        const num2 = Math.floor(Math.random() * 5) + 1;
                        const den = Math.floor(Math.random() * 8) + 2;
                        answer = num1 + num2;
                        question = `${num1}/${den} + ${num2}/${den} = ?/${den}`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? 1 : -1);
                    }
                    break;
                    
                case 5: // Decimals, percentages
                    if (Math.random() > 0.5) {
                        const a = (Math.floor(Math.random() * 50) + 10) / 10;
                        const b = (Math.floor(Math.random() * 50) + 10) / 10;
                        answer = Math.round((a + b) * 10) / 10;
                        question = `${a} + ${b} = ?`;
                        wrongAnswer = Math.round((answer + (Math.random() > 0.5 ? 0.5 : -0.5)) * 10) / 10;
                    } else {
                        const num = Math.floor(Math.random() * 90) + 10;
                        const percent = Math.floor(Math.random() * 9) + 1;
                        answer = Math.round(num * percent / 10);
                        question = `${percent * 10}% of ${num} = ?`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 10) + 1 : -(Math.floor(Math.random() * 10) + 1));
                    }
                    break;
                    
                case 6: // Ratios, negative numbers
                    if (Math.random() > 0.5) {
                        const a = Math.floor(Math.random() * 20) - 10;
                        const b = Math.floor(Math.random() * 20) - 10;
                        answer = a + b;
                        question = `${a} + ${b} = ?`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 5) + 1 : -(Math.floor(Math.random() * 5) + 1));
                    } else {
                        const a = Math.floor(Math.random() * 10) + 2;
                        const b = Math.floor(Math.random() * 10) + 2;
                        const mult = Math.floor(Math.random() * 5) + 2;
                        answer = b * mult;
                        question = `${a}:${b} = ${a * mult}:?`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 5) + 1 : -(Math.floor(Math.random() * 5) + 1));
                    }
                    break;
                    
                case 7: // Equations, exponents
                    if (Math.random() > 0.5) {
                        const x = Math.floor(Math.random() * 10) + 1;
                        const add = Math.floor(Math.random() * 20) + 1;
                        answer = x;
                        question = `x + ${add} = ${x + add}, x = ?`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 5) + 1 : -(Math.floor(Math.random() * 5) + 1));
                    } else {
                        const base = Math.floor(Math.random() * 5) + 2;
                        const exp = Math.floor(Math.random() * 3) + 2;
                        answer = Math.pow(base, exp);
                        question = `${base}^${exp} = ?`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 10) + 5 : -(Math.floor(Math.random() * 10) + 5));
                    }
                    break;
                    
                case 8: // Advanced algebra, pythagorean theorem
                    if (Math.random() > 0.5) {
                        const x = Math.floor(Math.random() * 10) + 1;
                        const mult = Math.floor(Math.random() * 5) + 2;
                        const result = x * mult;
                        answer = x;
                        question = `${mult}x = ${result}, x = ?`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 3) + 1 : -(Math.floor(Math.random() * 3) + 1));
                    } else {
                        const a = Math.floor(Math.random() * 10) + 3;
                        const b = Math.floor(Math.random() * 10) + 3;
                        answer = Math.round(Math.sqrt(a * a + b * b));
                        question = `√(${a}² + ${b}²) ≈ ?`;
                        wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 3) + 1 : -(Math.floor(Math.random() * 3) + 1));
                    }
                    break;
            }
            
            // Make sure wrong answer is different and positive if needed
            while (wrongAnswer === answer || wrongAnswer < 0) {
                wrongAnswer = answer + (Math.random() > 0.5 ? Math.floor(Math.random() * 10) + 1 : -(Math.floor(Math.random() * 10) + 1));
            }
            
            // Randomly assign correct answer to left or right
            const correctSide = Math.floor(Math.random() * 2);
            
            return {
                question: question,
                correctAnswer: answer,
                wrongAnswer: wrongAnswer,
                correctSide: correctSide
            };
        }

        // Initialize the game
        function initGame() {
            currentStep = 0;
            gameActive = true;
            isMemoryFlashing = false;
            
            if (gameMode === 'math') {
                document.getElementById('mode-badge').textContent = `🧮 Math Mode - Grade ${gradeLevel}`;
                document.getElementById('math-question').classList.remove('hidden');
                updateMessage("Answer the math question to choose the correct path!");
            } else if (gameMode === 'hard') {
                document.getElementById('mode-badge').textContent = '💀 Hard Mode';
                document.getElementById('math-question').classList.add('hidden');
                updateMessage("Choose Left or Right — no hints this time!");
            } else if (gameMode === 'memory') {
                document.getElementById('mode-badge').textContent = '🧠 Memory Mode';
                document.getElementById('math-question').classList.add('hidden');
                updateMessage("Get ready to memorize the path...");
            } else {
                document.getElementById('mode-badge').textContent = '🌉 Classic Mode';
                document.getElementById('math-question').classList.add('hidden');
                updateMessage("Choose Left or Right to cross the bridge!");
            }
            
            generateCorrectPath();
            renderBridge();
            updateStats();
            updatePowerUpDisplay();

            if (gameMode === 'memory') {
                startMemoryFlash();
            }
        }

        // Generate random correct path (0 = left, 1 = right)
        function generateCorrectPath() {
            correctPath = [];
            for (let i = 0; i < TOTAL_STEPS; i++) {
                if (gameMode === 'math') {
                    correctPath.push(generateMathQuestion());
                } else {
                    correctPath.push(Math.floor(Math.random() * 2));
                }
            }
            if (gameMode === 'classic') {
                console.log("New path generated:", correctPath.map(p => p === 0 ? "Left" : "Right"));
            }
        }

        // Flash the correct path for memory mode, then hide it
        function startMemoryFlash() {
            gameActive = false;
            isMemoryFlashing = true;
            renderBridge();

            let countdown = 3;
            updateMessage(`🧠 Memorize the path! Hiding in ${countdown}...`);

            const countdownInterval = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    updateMessage(`🧠 Memorize the path! Hiding in ${countdown}...`);
                } else {
                    clearInterval(countdownInterval);
                    isMemoryFlashing = false;
                    gameActive = true;
                    renderBridge();
                    updateMessage("The path is hidden. Trust your memory — you only have 1 life! 🧠");
                }
            }, 1000);
        }

        // Render the bridge
        function renderBridge() {
            const bridge = document.getElementById('bridge');
            bridge.innerHTML = '';

            for (let step = 0; step < TOTAL_STEPS; step++) {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'step';

                const label = document.createElement('div');
                label.className = 'step-label';
                label.textContent = `Step ${step + 1}`;
                stepDiv.appendChild(label);

                const tilesDiv = document.createElement('div');
                tilesDiv.className = 'tiles';

                // Left tile
                const leftTile = createTile(step, 0);
                tilesDiv.appendChild(leftTile);

                // Right tile
                const rightTile = createTile(step, 1);
                tilesDiv.appendChild(rightTile);

                stepDiv.appendChild(tilesDiv);
                bridge.appendChild(stepDiv);
            }
        }

        // Create a tile
        function createTile(step, side) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            if (gameMode === 'math') {
                tile.classList.add('math-tile');
                const question = correctPath[step];
                const answer = side === question.correctSide ? question.correctAnswer : question.wrongAnswer;
                tile.textContent = answer;
                
                // Show current question
                if (step === currentStep) {
                    currentQuestion = question;
                    document.getElementById('math-question').textContent = question.question;
                }
            } else {
                tile.textContent = side === 0 ? '⬅️' : '➡️';
            }

            // Show correct path during memory flash
            if (gameMode === 'memory' && isMemoryFlashing && correctPath[step] === side) {
                tile.classList.add('memory-flash');
            }

            // Show learned safe path in green (classic and math modes only)
            if ((gameMode === 'classic' || gameMode === 'math') && learnedPath[step] === side) {
                tile.classList.add('safe-path');
            }

            // Disable tiles that are not the current step
            if (step !== currentStep || !gameActive) {
                tile.classList.add('disabled');
            } else {
                tile.addEventListener('click', () => handleTileClick(step, side, tile));
            }

            return tile;
        }

        // Handle tile click
        function handleTileClick(step, side, tile) {
            if (!gameActive || step !== currentStep) return;

            // Disable all tiles temporarily
            gameActive = false;
            const allTiles = document.querySelectorAll('.tile');
            allTiles.forEach(t => t.classList.add('disabled'));

            let isCorrect = false;
            if (gameMode === 'math') {
                const question = correctPath[step];
                isCorrect = (side === question.correctSide);
            } else {
                isCorrect = (correctPath[step] === side);
            }

            if (isCorrect) {
                // Correct choice!
                if (gameMode !== 'hard') {
                    tile.classList.add('correct');
                }
                learnedPath[step] = side;
                playSuccessSound();
                
                setTimeout(() => {
                    currentStep++;
                    
                    if (currentStep >= TOTAL_STEPS) {
                        // Won!
                        winRound();
                    } else {
                        // Move to next step
                        updateMessage(`Great! Move to Step ${currentStep + 1}`);
                        gameActive = true;
                        renderBridge();
                        updateStats();
                    }
                }, 1000);
            } else {
                // Wrong choice!
                tile.classList.add('wrong');
                
                // Check if player has a free step to use
                if (freeStepsAvailable > 0) {
                    freeStepsAvailable--;
                    playSuccessSound();
                    updatePowerUpDisplay();
                    
                    setTimeout(() => {
                        updateMessage(`⭐ Free Step used! No penalty. Move to Step ${currentStep + 1}`);
                        currentStep++;
                        
                        if (currentStep >= TOTAL_STEPS) {
                            winRound();
                        } else {
                            gameActive = true;
                            renderBridge();
                            updateStats();
                        }
                    }, 1000);
                } else {
                    lives--;
                    playErrorSound();
                    
                    setTimeout(() => {
                        if (lives <= 0) {
                            // Check for bonus life
                            if (bonusLivesAvailable > 0) {
                                bonusLivesAvailable--;
                                lives = MAX_LIVES;
                                updateMessage(`💖 Bonus Life activated! Lives restored to ${MAX_LIVES}!`);
                                updatePowerUpDisplay();
                                updateStats();
                                
                                setTimeout(() => {
                                    updateMessage(`Continue from Step ${currentStep + 1}!`);
                                    currentStep = 0;
                                    gameActive = true;
                                    renderBridge();
                                }, 2000);
                            } else {
                                // Game over
                                gameOver();
                            }
                        } else {
                            // Try again
                            updateMessage(`💔 Wrong choice! Lives left: ${lives}. Try again!`);
                            currentStep = 0;
                            gameActive = true;
                            renderBridge();
                            updateStats();
                        }
                    }, 1500);
                }
            }
        }

        // Win the round
        function winRound() {
            if (gameMode === 'math') {
                lives = MATH_MODE_LIVES;
            } else if (gameMode === 'memory') {
                lives = MEMORY_MODE_LIVES;
            } else {
                lives = MAX_LIVES; // Restore lives!
            }
            bonusLivesAvailable++; // Award bonus life on each win!
            playWinSound();
            updateStats();
            updatePowerUpDisplay();
            updateMessage(`🎉 You made it! +1 Bonus Life! Spin the wheel for your prize!`);
            
            setTimeout(() => {
                showPrizeWheel();
            }, 1500);
        }

        // Create the prize wheel
        function createWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            
            // Create segments based on probabilities
            let segments = [];
            PRIZES.forEach(prize => {
                const count = Math.round(prize.probability * 100);
                for (let i = 0; i < count; i++) {
                    segments.push(prize);
                }
            });
            
            // Shuffle segments for visual variety
            segments = segments.sort(() => Math.random() - 0.5);
            
            const segmentAngle = 360 / segments.length;
            
            segments.forEach((prize, index) => {
                const segment = document.createElement('div');
                segment.className = 'wheel-segment';
                segment.style.transform = `rotate(${index * segmentAngle}deg)`;
                segment.style.background = prize.color;
                segment.style.clipPath = `polygon(0 0, 100% 0, 100% 100%)`;
                
                const content = document.createElement('div');
                content.className = 'segment-content';
                content.textContent = prize.name;
                segment.appendChild(content);
                
                wheel.appendChild(segment);
            });
            
            return segments;
        }

        // Show prize wheel modal
        function showPrizeWheel() {
            const modal = document.getElementById('wheel-modal');
            const wheel = document.getElementById('wheel');
            const resultDiv = document.getElementById('wheel-result');
            
            modal.classList.add('active');
            resultDiv.textContent = 'Spinning...';
            
            // Create wheel segments
            const segments = createWheel();
            
            // Determine prize based on probabilities
            const rand = Math.random();
            let cumulative = 0;
            let selectedPrize = PRIZES[0];
            
            for (let prize of PRIZES) {
                cumulative += prize.probability;
                if (rand <= cumulative) {
                    selectedPrize = prize;
                    break;
                }
            }
            
            // Calculate rotation to land on selected prize
            // Find a segment with the selected prize
            const targetIndex = segments.findIndex(s => s.name === selectedPrize.name);
            const segmentAngle = 360 / segments.length;
            const targetAngle = targetIndex * segmentAngle + segmentAngle / 2;
            
            // Spin multiple times plus the target angle
            const spins = 5 + Math.random() * 3; // 5-8 full rotations
            const finalRotation = spins * 360 + (360 - targetAngle);
            
            wheel.style.transform = 'rotate(0deg)';
            
            setTimeout(() => {
                wheel.classList.add('spinning');
                wheel.style.transform = `rotate(${finalRotation}deg)`;
            }, 100);
            
            // Show result after spin
            setTimeout(() => {
                awardPrize(selectedPrize);
                wheel.classList.remove('spinning');
                
                setTimeout(() => {
                    modal.classList.remove('active');
                    startNewRound();
                }, 3000);
            }, 6000);
        }

        // Award the prize
        function awardPrize(prize) {
            const resultDiv = document.getElementById('wheel-result');
            
            if (prize.type === 'money') {
                money += prize.value;
                resultDiv.innerHTML = `🎉 You won ${prize.name}! 🎉`;
                playWinSound();
            } else if (prize.type === 'freeStep') {
                freeStepsAvailable++;
                resultDiv.innerHTML = `⭐ You won a FREE STEP! ⭐<br><small>Use it anytime!</small>`;
                playWinSound();
            } else if (prize.type === 'bonusLife') {
                bonusLivesAvailable++;
                resultDiv.innerHTML = `💖 You won a BONUS LIFE! 💖<br><small>Activated automatically!</small>`;
                playWinSound();
            }
            
            updateStats();
            updatePowerUpDisplay();
        }

        // Start a new round
        function startNewRound() {
            currentStep = 0;
            learnedPath = [];
            isMemoryFlashing = false;
            generateCorrectPath();
            gameActive = true;
            renderBridge();
            updateMessage("New round! Choose your path!");

            if (gameMode === 'memory') {
                startMemoryFlash();
            }
        }

        // Update power-up display
        function updatePowerUpDisplay() {
            const powerUpDiv = document.getElementById('power-ups');
            let html = '';
            
            if (freeStepsAvailable > 0) {
                html += `<span class="power-up-indicator">⭐ Free Steps: ${freeStepsAvailable}</span>`;
            }
            if (bonusLivesAvailable > 0) {
                html += `<span class="power-up-indicator">💖 Bonus Lives: ${bonusLivesAvailable}</span>`;
            }
            
            powerUpDiv.innerHTML = html;
        }

        // Game over
        function gameOver() {
            updateMessage(`💀 Game Over! Total earnings: $${money.toLocaleString()}`);
            updateStats();
            
            setTimeout(() => {
                const shouldRestart = confirm(`Game Over!\n\nTotal Money Earned: $${money.toLocaleString()}\n\nPlay again?`);
                if (shouldRestart) {
                    restartGame();
                }
            }, 1000);
        }

        // Restart the entire game
        function restartGame() {
            // Show mode selector again
            document.getElementById('mode-selector').classList.remove('hidden');
            document.getElementById('grade-selector').classList.add('hidden');
            
            currentStep = 0;
            if (gameMode === 'math') lives = MATH_MODE_LIVES;
            else if (gameMode === 'memory') lives = MEMORY_MODE_LIVES;
            else lives = MAX_LIVES;
            // Keep money - don't reset it
            learnedPath = [];
            isMemoryFlashing = false;
            freeStepsAvailable = 0;
            bonusLivesAvailable = 0;
        }

        // Update stats display
        function updateStats() {
            document.getElementById('lives').textContent = lives;
            document.getElementById('money').textContent = `$${money.toLocaleString()}`;
            document.getElementById('current-step').textContent = currentStep + 1;
        }

        // Update message
        function updateMessage(text) {
            document.getElementById('message').textContent = text;
        }

        // Keyboard controls
        document.addEventListener('keydown', (event) => {
            if (!gameActive) return;
            
            // Initialize audio on first interaction
            if (!audioContext) {
                initAudio();
            }
            
            if (event.key === 'ArrowLeft') {
                event.preventDefault();
                const leftTile = document.querySelector(`.step:nth-child(${currentStep + 1}) .tile:first-of-type:not(.disabled)`);
                if (leftTile) {
                    leftTile.click();
                }
            } else if (event.key === 'ArrowRight') {
                event.preventDefault();
                const rightTile = document.querySelector(`.step:nth-child(${currentStep + 1}) .tile:last-of-type:not(.disabled)`);
                if (rightTile) {
                    rightTile.click();
                }
            }
        });

        // Initialize audio on first click
        document.addEventListener('click', () => {
            if (!audioContext) {
                initAudio();
            }
        }, { once: true });

        // Show mode selector when page loads
        document.getElementById('mode-selector').classList.remove('hidden');
    </script>
</body>
</html>
